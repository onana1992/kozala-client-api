spring.application.name=kozala-client

# Server (0.0.0.0 = accepter les connexions du téléphone / autres machines sur le réseau)
server.port=8082
server.address=0.0.0.0

# Datasource (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/core_auth_test?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=core
spring.datasource.password=core2025
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# HikariCP : éviter thread starvation et crash lors des lookups lourds (répertoire)
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.keepalive-time=30000

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT
jwt.secret=VotreCleSecreteTresLongueEtComplexeMinimum256BitsPourHS256EnProductionUtiliserEnv
jwt.refresh-secret=UneAutreCleLonguePourRefreshTokenEnProductionUtiliserVariableEnv
jwt.access-expiration-ms=900000
jwt.refresh-expiration-ms=604800000

# JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Redis (OTP + signup tokens)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=5000

# Actuator (health inclut Redis)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Photo de profil (stockage local)
app.profile-photo.upload-dir=${user.dir}/uploads/profile-photos
app.profile-photo.max-size-bytes=5242880
app.profile-photo.allowed-content-types=image/jpeg,image/png,image/webp

