spring.application.name=kozala-client

# Server (0.0.0.0 = accepter les connexions du téléphone / autres machines sur le réseau)
server.port=8082
server.address=0.0.0.0
# Multipart : documents + selfie (images jusqu'à 10 Mo chacune)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=25MB

# Datasource (MySQL) — prod : application-local.properties (gitignored) ou variables d’env / docker-run-kozala-client.env
# Exemple RDS commenté :
# spring.datasource.url=jdbc:mysql://VOTRE_RDS:3306/kozala_test_db?serverTimezone=UTC&useSSL=true
# spring.datasource.username=admin
# spring.datasource.password=
spring.datasource.url=jdbc:mysql://localhost:3306/core_auth_test?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=core
spring.datasource.password=core2025
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP : éviter thread starvation et crash lors des lookups lourds (répertoire)
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.keepalive-time=30000

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT
jwt.secret=VotreCleSecreteTresLongueEtComplexeMinimum256BitsPourHS256EnProductionUtiliserEnv
jwt.refresh-secret=UneAutreCleLonguePourRefreshTokenEnProductionUtiliserVariableEnv
jwt.access-expiration-ms=900000
jwt.refresh-expiration-ms=604800000

# JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Redis (OTP + signup tokens)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=5000

# Actuator (health inclut Redis)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Photo de profil : S3 si aws.s3.bucket-identity est défini, sinon disque (upload-dir).
# Sur EC2 sans volume : mettre require-aws-storage=true pour n’écrire que sur S3.
app.profile-photo.upload-dir=${user.dir}/uploads/profile-photos
app.profile-photo.max-size-bytes=5242880
app.profile-photo.allowed-content-types=image/jpeg,image/png,image/webp
app.profile-photo.require-aws-storage=false

# Comparaison visage document/selfie : aws (Rekognition) | none (accepter sans vérification)
app.face-verification.provider=aws

# AWS – Stockage S3 (documents, selfies, photos de profil) et Rekognition (comparaison visages)
# Voir docs/GUIDE-VERIF-IDENTITE-AWS.md — laisser les clés vides pour utiliser AWS_ACCESS_KEY_ID / profil IAM
aws.region=us-east-1
aws.access-key-id=
aws.secret-access-key=
aws.s3.bucket-identity=
aws.rekognition.face-match-threshold=0.8

# Jeton service pour tous les appels HTTP sortants vers l’API bancaire (Authorization: Bearer). Ne pas utiliser le JWT mobile.
app.remote-api.base-url=http://localhost:8080
app.remote-api.bearer-token=
app.remote-api.current-account-product-code=CURR-STD-XAF
app.remote-api.savings-account-product-code=SAV-STD-XAF